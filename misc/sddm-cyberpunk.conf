; SDDM Silent theme -- Cyberpunk override
; Copy this to: /usr/share/sddm/themes/silent/configs/cyberpunk.conf
;
; sudo cp ~/docs/sddm-cyberpunk.conf /usr/share/sddm/themes/silent/configs/cyberpunk.conf
;
; Random wallpaper (different from desktop):
;   sudo mkdir -p /etc/systemd/system/sddm.service.d/
;   sudo cp ~/docs/sddm-wallpaper-dropin.conf /etc/systemd/system/sddm.service.d/wallpaper.conf
;   sudo mkdir -p /var/lib/sddm && sudo chown root:sddm /var/lib/sddm
;   sudo systemctl daemon-reload
;
; "sudo password:" display name (replaces "cooper" on login screen):
;   sudo chfn -f "sudo password:" cooper

[General]
scale = 1.0
enable-animations = true
background-fill-mode = "fill"

[LockScreen]
display = false

[LoginScreen]
background = "/var/lib/sddm/wallpaper"
use-background-color = false
blur = 0
brightness = -0.1
saturation = 0.2

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 150
inactive-size = 100
inactive-opacity = 0.35
active-border-size = 2
inactive-border-size = 0
active-border-color = "#5a9fd4"
inactive-border-color = "#2d3550"

[LoginScreen.LoginArea.Username]
font-family = "JetBrainsMono Nerd Font"
font-size = 34
font-weight = 700
color = "#f0b429"
margin = 12

[LoginScreen.LoginArea.PasswordInput]
width = 240
height = 34
display-icon = true
font-family = "JetBrainsMono Nerd Font"
font-size = 13
icon = "password.svg"
icon-size = 16
content-color = "#c8d0e0"
background-color = "#0a0d14"
background-opacity = 0.85
border-size = 1
border-color = "#5a9fd4"
border-radius-left = 0
border-radius-right = 0
margin-top = 12
masked-character = "◆"

[LoginScreen.LoginArea.LoginButton]
background-color = "#5a9fd4"
background-opacity = 0.9
active-background-color = "#f0b429"
active-background-opacity = 1.0
icon = "arrow-right.svg"
icon-size = 18
content-color = "#0a0d14"
active-content-color = "#0a0d14"
border-size = 0
border-radius-left = 0
border-radius-right = 0
margin-left = 5
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "JetBrainsMono Nerd Font"
font-size = 13
font-weight = 600

[LoginScreen.LoginArea.WarningMessage]
font-family = "JetBrainsMono Nerd Font"
font-size = 11
font-weight = 400
normal-color = "#c8d0e0"
warning-color = "#f0b429"
error-color = "#cc3333"
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 50
margin-right = 50
margin-bottom = 50
margin-left = 50
size = 30
border-radius = 0
spacing = 10
font-family = "JetBrainsMono Nerd Font"
