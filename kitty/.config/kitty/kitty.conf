# Kitty Terminal -- Cyberpunk Config

# --- FONT ---
font_family      Liberation Mono
bold_font        Liberation Mono Bold
italic_font      Liberation Mono Italic
bold_italic_font Liberation Mono Bold Italic
font_size        13.0
disable_ligatures always

# --- CURSOR ---
cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# --- COLORS (theme-switch swaps current-colors.conf for live reload) ---
include current-colors.conf

# --- WINDOW ---
window_padding_width    8
window_border_width     1pt
draw_minimal_borders    yes

# --- TABS ---
tab_bar_style           powerline
tab_powerline_style     slanted

# --- PERFORMANCE ---
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# --- MISC ---
enable_audio_bell        no
visual_bell_duration     0
confirm_os_window_close  0
shell_integration        enabled
allow_remote_control     yes
listen_on                unix:/tmp/kitty-socket
