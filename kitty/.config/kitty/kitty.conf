# Kitty Terminal -- Cyberpunk Config

# --- FONT ---
font_family      Liberation Mono
bold_font        Liberation Mono Bold
italic_font      Liberation Mono Italic
bold_italic_font Liberation Mono Bold Italic
font_size        13.0
disable_ligatures always

# --- CURSOR ---
cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# --- COLORS (Cyberpunk: cold near-black, blue primary, gold accent) ---
background            #0a0d14
foreground            #e0e8f0

# Black
color0  #1a1f2e
color8  #2d3550

# Red (alerts/errors)
color1  #cc3333
color9  #ff4444

# Green
color2  #3fa060
color10 #52cc7a

# Yellow / Gold
color3  #c8951a
color11 #f0b429

# Blue (primary accent)
color4  #3d7ab5
color12 #5a9fd4

# Magenta
color5  #8855cc
color13 #aa77ee

# Cyan
color6  #2d9db0
color14 #3dc4db

# White
color7  #c8d0e0
color15 #e8f0ff

# Cursor -- blue
cursor            #5a9fd4
cursor_text_color #0a0d14

# Selection -- blue
selection_background #3d7ab5
selection_foreground #e8f0ff

# URL underline
url_color #5a9fd4

# --- WINDOW ---
window_padding_width    8
window_border_width     1pt
active_border_color     #5a9fd4
inactive_border_color   #2d3550
draw_minimal_borders    yes

# --- TABS ---
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #0a0d14
active_tab_background   #5a9fd4
inactive_tab_foreground #8090b0
inactive_tab_background #1a1f2e

# --- PERFORMANCE ---
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# --- MISC ---
enable_audio_bell        no
visual_bell_duration     0
confirm_os_window_close  0
shell_integration        enabled
