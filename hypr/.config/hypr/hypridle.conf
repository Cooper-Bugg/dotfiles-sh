general {
    lock_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

listener {
    timeout = 300                                 # 5 min lock on battery
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && (pidof hyprlock || hyprlock)
}

listener {
    timeout = 600                                 # 10 min lock on AC/Battery
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    timeout = 900                                 # 15 min screen off on battery
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 1800                                # 30 min screen off on AC/Battery
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
