general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    ignore_empty_input = true
}

background {
    monitor =
    path = cmd[reload] cat /home/cooper/.cache/current-wallpaper 2>/dev/null || echo /home/cooper/media/images/wallpapers/island-night.png
    blur_passes = 0
    brightness = -0.1
    contrast = 1.0
    vibrancy = 0.15
}

# Clock
label {
    monitor =
    text = $TIME12
    color = rgba(224, 232, 240, 0.9)
    font_size = 72
    font_family = JetBrains Mono
    position = 0, 160
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(224, 232, 240, 0.6)
    font_size = 16
    font_family = JetBrains Mono
    position = 0, 100
    halign = center
    valign = center
}

# Password label
label {
    monitor =
    text = password:
    color = rgba(240, 180, 41, 0.8)
    font_size = 13
    font_family = JetBrains Mono
    position = 0, 30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 40
    outline_thickness = 1
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(90, 159, 212, 0.8)
    inner_color = rgba(10, 13, 20, 0.85)
    font_color = rgb(224, 232, 240)
    fade_on_empty = true
    placeholder_text =
    hide_input = false
    rounding = 0
    check_color = rgb(90, 159, 212)
    fail_color = rgb(204, 51, 51)
    fail_text = <i>DENIED</i>
    position = 0, -20
    halign = center
    valign = center
}
